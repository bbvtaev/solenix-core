<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Metrics Explorer</title>
  <script src="/chart.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #6c8ef5;
      --green:   #4ade80;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }
    .logo { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .header-sep { color: var(--border); }
    .header-info { font-size: 12px; color: var(--muted); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 2s infinite;
    }
    .live-dot.dead { background: var(--muted); animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 24px;
    }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 300px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty svg { opacity: .25; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }

    /* ── Metric card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-metric {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .card-stats {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }
    .stat {
      font-size: 11px;
      color: var(--muted);
    }
    .stat b { color: var(--text); font-weight: 500; }

    .chart-wrap {
      padding: 12px 16px 8px;
      height: 160px;
      position: relative;
    }

    /* ── Series tags ── */
    .series-list {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .series-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    .series-color {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .series-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }
    .tag {
      background: rgba(108,142,245,.1);
      border: 1px solid rgba(108,142,245,.18);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
    }
    .no-labels { color: var(--muted); }
    .series-pts { color: var(--muted); flex-shrink: 0; }
    .series-latest { color: var(--text); font-weight: 500; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <span class="logo">⚡ Pulse</span>
  <span class="header-sep">|</span>
  <span class="header-info" id="version">connecting...</span>
  <div class="header-right">
    <span id="metric-count">0 metrics</span>
    <div class="live-dot dead" id="live-dot"></div>
  </div>
</header>

<div class="content" id="content">
  <div class="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>Waiting for metrics...</span>
  </div>
</div>

<script>
  const COLORS = ['#6c8ef5','#4ade80','#fb923c','#f472b6','#a78bfa','#34d399','#fbbf24','#60a5fa'];

  let charts = {};   // metric → Chart instance
  let snapshot = []; // last known metrics[]

  // ── API ───────────────────────────────────────────────────────────────────

  async function fetchSnapshot() {
    const r = await fetch('/api/snapshot');
    const data = await r.json();
    return data.metrics || [];
  }

  async function fetchHealth() {
    const r = await fetch('/api/health');
    return r.json();
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function totalPoints(metric) {
    return (metric.series || []).reduce((s, sr) => s + sr.total_points, 0);
  }

  function latestValue(metric) {
    let latest = null;
    for (const s of (metric.series || [])) {
      if (!s.points.length) continue;
      const p = s.points[s.points.length - 1];
      if (!latest || p.timestamp > latest.timestamp) latest = p;
    }
    return latest;
  }

  function renderGrid(metrics) {
    const content = document.getElementById('content');

    document.getElementById('metric-count').textContent =
      `${metrics.length} metric${metrics.length !== 1 ? 's' : ''}`;

    if (metrics.length === 0) {
      content.innerHTML = `
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>No metrics yet</span>
        </div>`;
      return;
    }

    // Создаём/обновляем карточки
    const existingCards = new Set(Object.keys(charts));
    const incomingNames = new Set(metrics.map(m => m.metric));

    // Удаляем карточки метрик которых больше нет
    for (const name of existingCards) {
      if (!incomingNames.has(name)) {
        charts[name].destroy();
        delete charts[name];
      }
    }

    // Если сетки нет — создаём
    let grid = content.querySelector('.grid');
    if (!grid) {
      content.innerHTML = '<div class="grid"></div>';
      grid = content.querySelector('.grid');
    }

    // Для каждой метрики — создать карточку или обновить данные
    for (const metric of metrics) {
      const name = metric.metric;
      let card = grid.querySelector(`[data-metric="${CSS.escape(name)}"]`);

      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        card.dataset.metric = name;
        card.innerHTML = buildCardHTML(metric);
        grid.appendChild(card);
        buildChart(card, metric);
      } else {
        updateCard(card, metric);
      }
    }

    // Синхронизируем порядок карточек в DOM с порядком метрик
    metrics.forEach((metric, i) => {
      const card = grid.querySelector(`[data-metric="${CSS.escape(metric.metric)}"]`);
      if (card && grid.children[i] !== card) {
        grid.insertBefore(card, grid.children[i]);
      }
    });
  }

  function buildCardHTML(metric) {
    const latest = latestValue(metric);
    const pts = totalPoints(metric);
    return `
      <div class="card-header">
        <div class="card-metric" title="${metric.metric}">${metric.metric}</div>
        <div class="card-stats">
          <div class="stat"><b id="pts-${cssId(metric.metric)}">${fmtNum(pts)}</b> pts</div>
          ${latest ? `<div class="stat">latest <b id="lat-${cssId(metric.metric)}">${latest.value.toFixed(3)}</b></div>` : ''}
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-${cssId(metric.metric)}"></canvas>
      </div>
      <div class="series-list" id="slist-${cssId(metric.metric)}">
        ${buildSeriesRows(metric.series)}
      </div>
    `;
  }

  function updateCard(card, metric) {
    const name = metric.metric;
    const id = cssId(name);
    const latest = latestValue(metric);
    const pts = totalPoints(metric);

    const ptsEl = card.querySelector(`#pts-${id}`);
    if (ptsEl) ptsEl.textContent = fmtNum(pts);

    const latEl = card.querySelector(`#lat-${id}`);
    if (latEl && latest) latEl.textContent = latest.value.toFixed(3);

    const slist = card.querySelector(`#slist-${id}`);
    if (slist) slist.innerHTML = buildSeriesRows(metric.series);

    // Обновляем данные чарта без пересоздания
    const ch = charts[name];
    if (ch) {
      ch.data.datasets = buildDatasets(metric.series);
      ch.update('none'); // без анимации
    }
  }

  function buildSeriesRows(series) {
    if (!series || series.length === 0) return '';
    return series.map((s, i) => {
      const color = COLORS[i % COLORS.length];
      const last = s.points.length ? s.points[s.points.length - 1] : null;
      const tags = Object.entries(s.labels || {});
      return `
        <div class="series-row">
          <div class="series-color" style="background:${color}"></div>
          <div class="series-tags">
            ${tags.length
              ? tags.map(([k, v]) => `<span class="tag">${k}="${v}"</span>`).join('')
              : '<span class="no-labels">no labels</span>'}
          </div>
          <span class="series-pts">${fmtNum(s.total_points)} pts</span>
          ${last ? `<span class="series-latest">${last.value.toFixed(3)}</span>` : ''}
        </div>`;
    }).join('');
  }

  function buildDatasets(series) {
    return (series || []).map((s, i) => {
      const sorted = [...s.points].sort((a, b) => a.timestamp - b.timestamp);
      return {
        label: labelsStr(s.labels) || 'default',
        data: sorted.map(p => ({ x: p.timestamp / 1e6, y: p.value })),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: COLORS[i % COLORS.length] + '18',
        borderWidth: 1.5,
        pointRadius: sorted.length > 60 ? 0 : 2.5,
        tension: 0.3,
        fill: false,
      };
    });
  }

  function buildChart(card, metric) {
    const canvas = card.querySelector(`#chart-${cssId(metric.metric)}`);
    if (!canvas) return;

    if (charts[metric.metric]) {
      charts[metric.metric].destroy();
    }

    charts[metric.metric] = new Chart(canvas, {
      type: 'line',
      data: { datasets: buildDatasets(metric.series) },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0f1117',
            borderColor: '#2a2d3a',
            borderWidth: 1,
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            callbacks: {
              title: items => new Date(items[0].parsed.x).toLocaleTimeString(),
              label: item => ` ${item.dataset.label}: ${item.parsed.y.toFixed(4)}`,
            }
          }
        },
        scales: {
          x: {
            type: 'linear',
            ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 5,
              callback: v => new Date(v).toLocaleTimeString() },
            grid: { color: '#1e2130' },
          },
          y: {
            ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 4 },
            grid: { color: '#1e2130' },
          }
        }
      }
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function cssId(name) {
    return name.replace(/[^a-zA-Z0-9_-]/g, '_');
  }

  function labelsStr(labels) {
    return Object.entries(labels || {}).map(([k, v]) => `${k}=${v}`).join(' ');
  }

  function fmtNum(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
    return String(n);
  }

  // ── SSE ───────────────────────────────────────────────────────────────────

  function connect() {
    const dot = document.getElementById('live-dot');
    const source = new EventSource('/api/stream');

    source.onopen = () => {
      dot.classList.remove('dead');
    };

    source.onmessage = async () => {
      const metrics = await fetchSnapshot();
      renderGrid(metrics);
    };

    source.onerror = () => {
      dot.classList.add('dead');
      source.close();
      // Переподключение через 3s
      setTimeout(connect, 3000);
    };
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    try {
      const h = await fetchHealth();
      document.getElementById('version').textContent =
        `pulse-core ${h.version}`;
    } catch {
      document.getElementById('version').textContent = 'pulse-core';
    }

    connect();
  }

  init();
</script>
</body>
</html>
