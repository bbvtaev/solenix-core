syntax = "proto3";

package solenix;

option go_package = "github.com/bbvtaev/solenix-core/api/proto;solenixpb";

service SolenixDB {
  rpc Push(PushRequest)           returns (PushResponse);
  rpc Query(QueryRequest)         returns (QueryResponse);
  rpc QueryAgg(QueryAggRequest)   returns (QueryAggResponse);
  rpc Subscribe(SubscribeRequest) returns (stream DataPoint);
  rpc Health(HealthRequest)       returns (HealthResponse);
  rpc Metrics(MetricsRequest)     returns (MetricsResponse);
}

// --- Shared ---

message DataPoint {
  int64  timestamp = 1;
  double value     = 2;
}

message Series {
  string              metric = 1;
  map<string, string> labels = 2;
  repeated DataPoint  points = 3;
}

// --- Push ---

message PushRequest {
  repeated Series series = 1;
}

message PushResponse {
  int32 written = 1; // количество записанных серий
}

// --- Query ---

message QueryRequest {
  string              metric = 1;
  map<string, string> labels = 2;
  int64               from   = 3; // Unix nanoseconds, 0 = без ограничения
  int64               to     = 4; // Unix nanoseconds, 0 = без ограничения
}

message QueryResponse {
  repeated Series series = 1;
}


// --- Subscribe ---

message SubscribeRequest {
  string              metric = 1;
  map<string, string> labels = 2;
}

// Subscribe возвращает поток DataPoint по мере поступления новых данных

// --- Health ---

message HealthRequest {}

message HealthResponse {
  string status  = 1; // "ok"
  string version = 2;
}

// --- QueryAgg ---

message QueryAggRequest {
  string              metric   = 1;
  map<string, string> labels   = 2;
  int64               from     = 3;
  int64               to       = 4;
  string              window   = 5; // duration string: "1m", "5m", "1h"
  string              agg      = 6; // "avg", "min", "max", "sum", "count"
}

message AggPoint {
  int64  timestamp = 1;
  double value     = 2;
}

message AggSeries {
  string              metric = 1;
  map<string, string> labels = 2;
  string              window = 3;
  repeated AggPoint   points = 4;
}

message QueryAggResponse {
  repeated AggSeries series = 1;
}

// --- Metrics ---

message MetricsRequest {}

message MetricsResponse {
  repeated string metrics = 1;
}
